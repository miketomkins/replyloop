name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
        with:
          # The public audit intentionally fails closed on shallow history.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Public repository audit
        run: python3 scripts/public_repo_audit.py .
      - name: Unit tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests -p 'test_*.py' -v
      - name: Compile package
        run: |
          pycache=$(mktemp -d)
          PYTHONPYCACHEPREFIX="$pycache" python3 -m compileall -q replyloop
          rm -rf "$pycache"
      - name: Provision packaging tools
        run: python3 -m pip install --upgrade 'setuptools>=68' build wheel
      - name: Build source distribution
        run: python3 -m build --sdist --outdir dist
      - name: Build wheel
        run: |
          out=$(mktemp -d)
          python3 -m pip wheel --no-deps --no-build-isolation . -w "$out"
          mkdir -p dist
          cp "$out"/replyloop-*.whl dist/
      - name: Verify wheel
        run: |
          wheel=$(python3 -c "from pathlib import Path; import sys; print(next(Path('dist').glob('replyloop-*.whl'), ''))")
          python3 scripts/verify_wheel.py "$wheel"
      - name: Clean wheel install and doctor smoke test
        run: |
          wheel=$(python3 -c "from pathlib import Path; print(next(Path('dist').glob('replyloop-*.whl'), ''))")
          venv=$(mktemp -d)
          python3 -m venv "$venv"
          "$venv/bin/pip" install --no-index --no-deps "$wheel" >/dev/null
          smoke=$(mktemp -d)
          REPLYLOOP_DB="$smoke/replyloop.db" "$venv/bin/replyloop" --json doctor >/dev/null
      - name: Source cleanliness after build
        run: |
          rm -rf build dist *.egg-info
          git diff --exit-code
          test -z "$(git status --porcelain --ignored --untracked-files=all)"
